<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snowflake PIC</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f5f8;
  margin: 0;
  padding: 20px;
}

h1 {
  font-size: 32px;
}

.toolbar {
  margin: 20px 0;
}

input {
  padding: 8px;
  width: 250px;
}

button {
  padding: 6px 10px;
  margin-right: 5px;
  cursor: pointer;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 8px;
  margin-bottom: 15px;
  border: 1px solid #ddd;
}
</style>
</head>

<body>

<h1>Snowflake Problem Identification Charts</h1>

<div class="toolbar">
  <input type="text" id="search" placeholder="Search..." oninput="filterCards()">
  <br><br>
  <button onclick="setFilter('all')">All</button>
  <button onclick="setFilter('de')">Data Engineer</button>
  <button onclick="setFilter('arch')">Architect</button>
  <button onclick="setFilter('cio')">CIO / CTO</button>
</div>

<div id="cards"></div>

<script>
const data = [
  {p:"de", problem:"Pipelines frequently fail"},
  {p:"de", problem:"Incremental loads are hard"},
  {p:"arch", problem:"Data is spread across systems"},
  {p:"cio", problem:"High platform cost"}
];

let active = "all";

function build() {
  const container = document.getElementById("cards");
  container.innerHTML = "";

  data.forEach(d => {
    const div = document.createElement("div");
    div.className = "card";
    div.dataset.p = d.p;
    div.textContent = d.problem;
    container.appendChild(div);
  });
}

function setFilter(p) {
  active = p;
  filterCards();
}

function filterCards() {
  const q = document.getElementById("search").value.toLowerCase();
  document.querySelectorAll(".card").forEach(c => {
    const matchFilter = active === "all" || c.dataset.p === active;
    const matchSearch = c.textContent.toLowerCase().includes(q);
    c.style.display = (matchFilter && matchSearch) ? "" : "none";
  });
}

build();
</script>

</body>
</html>
